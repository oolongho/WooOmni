name: WooOmni
version: ${project.version}
main: com.oolonghoo.woomni.WooOmni
api-version: '1.21'
author: oolongho
description: A modular basic management plugin
libraries:
  - com.zaxxer:HikariCP:5.1.0
  - com.google.guava:guava:33.0.0-jre

commands:
  wooomni:
    description: Main command
    usage: /wooomni [args]
    permission: wooomni.use
    aliases: [omni, wo]
  fly:
    description: Toggle fly mode
    usage: /fly [player]
    permission: wooomni.fly
  flyspeed:
    description: Set fly speed
    usage: /flyspeed <speed> [player]
    permission: wooomni.flyspeed
  god:
    description: Toggle god mode
    usage: /god [player]
    permission: wooomni.god
  vanish:
    description: Toggle vanish mode
    usage: /vanish [player]
    permission: wooomni.vanish
  vanishlist:
    description: List vanished players
    usage: /vanishlist
    permission: wooomni.vanish.list
  vanishedit:
    description: Open vanish settings GUI
    usage: /vanishedit [player]
    permission: wooomni.vanish.edit
  inv:
    description: View or edit player inventory
    usage: /inv <player>
    permission: wooomni.inv.view
    aliases: [inventory]
  ender:
    description: View or edit player ender chest
    usage: /ender [player]
    permission: wooomni.ender.view
    aliases: [enderchest]

permissions:
  wooomni.use:
    default: true
  wooomni.admin:
    default: op
  wooomni.reload:
    default: op
  wooomni.fly:
    default: op
  wooomni.fly.other:
    default: op
  wooomni.fly.bypass.disabled:
    default: op
  wooomni.flyspeed:
    default: op
  wooomni.god:
    default: op
  wooomni.god.other:
    default: op
  wooomni.god.bypass.disabled:
    default: op
  wooomni.vanish:
    default: op
  wooomni.vanish.other:
    default: op
  wooomni.vanish.list:
    default: op
  wooomni.vanish.see:
    default: op
  wooomni.vanish.autojoin:
    default: op
  wooomni.vanish.edit:
    default: op
  wooomni.vanish.edit.other:
    default: op
  wooomni.inv.view:
    default: op
  wooomni.inv.edit:
    default: op
  wooomni.inv.exempt:
    default: false
  wooomni.ender.view:
    default: op
  wooomni.ender.edit:
    default: op
  wooomni.ender.exempt:
    default: false
