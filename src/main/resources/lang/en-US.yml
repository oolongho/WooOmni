god:
  enabled: "&aGod mode enabled for %player%."
  disabled: "&cGod mode disabled for %player%."
  enabled-self: "&aGod mode enabled."
  disabled-self: "&cGod mode disabled."

vanish:
  enabled: "&aVanish mode enabled for %player%."
  disabled: "&cVanish mode disabled for %player%."
  enabled-self: "&aVanish mode enabled."
  disabled-self: "&cVanish mode disabled."
