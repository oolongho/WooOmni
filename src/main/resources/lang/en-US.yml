inventory:
  player-not-found: "&cPlayer not found: %player%"
  inv-opened: "&aViewing %player%'s inventory."
  ender-opened: "&aViewing %player%'s ender chest."
  copied: "&aCopied %player%'s inventory contents."
  ender-copied: "&aCopied %player%'s ender chest contents."
  cleared: "&aCleared %player%'s inventory."
  ender-cleared: "&aCleared %player%'s ender chest."
  no-edit-permission: "&cYou don't have permission to edit this inventory."
  player-info:
    - "&e========== &6Player Info &e=========="
    - "&ePlayer: &f%player%"
    - "&eUUID: &f%uuid%"
    - "&eOnline: &f%online%"
    - "&eHealth: &f%health%/%max_health%"
    - "&eHunger: &f%food%"
    - "&eExperience: &f%level% (%exp%/%max_exp%)"
    - "&eMode: &f%gamemode%"
    - "&eLocation: &f%world% (%x%, %y%, %z%)"
