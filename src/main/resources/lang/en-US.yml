  header: "&e========== &6WooOmni Help &e=========="
  footer: "&e===================================="
  fly: "&e/fly [player] &7- Toggle fly mode"
  flyspeed: "&e/flyspeed <speed> [player] &7- Set fly speed (0.1-10)"
  god: "&e/god [player] &7- Toggle god mode"
  vanish: "&e/vanish [player] &7- Toggle vanish mode"
  vanishlist: "&e/vanishlist &7- List vanished players"
  vanishedit: "&e/vanishedit [player] &7- Open vanish settings GUI"
  inv: "&e/inv <player> &7- View player's inventory"
  ender: "&e/ender [player] &7- View player's ender chest (or your own)"
